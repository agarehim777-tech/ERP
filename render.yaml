services:
  - type: web
    name: erpaz-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ERP_BOOTSTRAP_EMAIL
        sync: false
      - key: ERP_BOOTSTRAP_PASSWORD
        sync: false
      - key: ERP_CORS_ORIGIN
        value: https://agarehim777-tech.github.io
