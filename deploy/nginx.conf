server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;
  autoindex off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types application/javascript application/json application/manifest+json application/xml image/svg+xml text/css text/plain;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location /assets/ {
    try_files $uri =404;
    expires 30d;
  }

  location = /index.html {
    expires -1;
  }

  location ~ /\. {
    deny all;
  }

  location / {
    try_files $uri $uri/ /index.html;
    expires -1;
  }
}
